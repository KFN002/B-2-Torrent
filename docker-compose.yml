services:
  nginx:
    image: nginx:1.30-alpine
    container_name: b2torrent-nginx
    ports:
      - "127.0.0.1:${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - torrent-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/nginx-health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - NET_BIND_SERVICE
      - SETGID
      - SETUID
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /var/log/nginx

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: b2torrent-frontend:latest
    container_name: b2torrent-frontend
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: /api
      NEXT_PUBLIC_ENABLE_EXTERNAL_LEAK_CHECKS: ${NEXT_PUBLIC_ENABLE_EXTERNAL_LEAK_CHECKS:-false}
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - torrent-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: b2torrent-backend:latest
    container_name: b2torrent-backend
    environment:
      NODE_ENV: production
      PORT: 8080
      DATABASE_URL: postgres://${POSTGRES_USER:-torrentuser}:${DB_PASSWORD:?Run node scripts/gen-env.mjs first}@postgres:5432/${POSTGRES_DB:-torrentdb}?sslmode=disable
      DOWNLOAD_DIR: /data/downloads
      PROXY_CHAIN: ${PROXY_CHAIN:-tor:9050}
      TOR_ENABLED: ${TOR_ENABLED:-true}
      NO_LOGS_MODE: ${NO_LOGS_MODE:-true}
      OBFUSCATE_TRAFFIC: ${OBFUSCATE_TRAFFIC:-true}
      LOG_LEVEL: ${LOG_LEVEL:-warn}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost,http://localhost:3000,http://127.0.0.1,http://127.0.0.1:3000}
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8080}:8080"
    volumes:
      - ${DOWNLOAD_DIR:-./downloads}:/data/downloads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      tor:
        condition: service_healthy
    networks:
      - torrent-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/api/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp

  postgres:
    image: postgres:18.3-alpine
    container_name: b2torrent-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-torrentuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Run node scripts/gen-env.mjs first}
      POSTGRES_DB: ${POSTGRES_DB:-torrentdb}
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=C"
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    networks:
      - torrent-network
    restart: unless-stopped
    command: >
      postgres
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
      -c maintenance_work_mem=64MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c max_connections=100
      -c log_statement=none
      -c log_duration=off
      -c logging_collector=off
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-torrentuser} -d ${POSTGRES_DB:-torrentdb}"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    security_opt:
      - no-new-privileges:true

  redis:
    image: redis:8.6-alpine
    container_name: b2torrent-redis
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --timeout 300
      --tcp-keepalive 60
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - torrent-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    security_opt:
      - no-new-privileges:true

  rabbitmq:
    image: rabbitmq:4.3-management-alpine
    container_name: b2torrent-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-b2t_admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:?Run node scripts/gen-env.mjs first}
      RABBITMQ_VM_MEMORY_HIGH_WATERMARK: 0.6
    ports:
      - "127.0.0.1:${RABBITMQ_PORT:-5672}:5672"
      - "127.0.0.1:${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - torrent-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    security_opt:
      - no-new-privileges:true

  tor:
    image: dperson/torproxy:latest
    container_name: b2torrent-tor
    ports:
      - "127.0.0.1:${TOR_SOCKS_PORT:-9050}:9050"
    networks:
      - torrent-network
    restart: unless-stopped
    environment:
      TOR_LOG: notice
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 9050 || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 30s
    security_opt:
      - no-new-privileges:true

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:

networks:
  torrent-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
